version: '3.8'
services:
  db:
    image: postgres:16
    container_name: expense-tracker-db
    environment:
      POSTGRES_USER: user1234
      POSTGRES_PASSWORD: 1234user
      POSTGRES_DB: db-exp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
